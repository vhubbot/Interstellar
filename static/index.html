  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6840529569014734"
    crossorigin="anonymous"></script>


  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');


    * {
      box-sizing: border-box;
    }


    html,
    body {

      width: 100%;
      height: 100%;
      margin: 0;

    }


    body {

      background: #000;

      color: white;

      font-family: Inter, Arial, sans-serif;

      overflow: hidden;

    }



    /* background */


    body::before {

      content: "";

      position: fixed;

      inset: -50%;


      background:

        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, .15), transparent 25%),

        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, .1), transparent 25%);


      animation: bg 15s infinite alternate;


    }


    @keyframes bg {

      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.3);
      }

    }



    #particles-js {

      position: fixed;

      inset: 0;

      z-index: 1;

    }




    .main {


      position: relative;

      z-index: 2;


      height: 100vh;


      display: flex;

      flex-direction: column;

      justify-content: center;

      align-items: center;


      padding: 20px;


    }



    /* Logo */


    .title {


      font-size: clamp(45px, 9vw, 90px);


      font-weight: 800;


      letter-spacing: -5px;


      margin: 0;


      animation:

        floating 4s ease-in-out infinite,

        shine 3s infinite;


    }



    @keyframes floating {

      0%,
      100% {

        transform: translateY(0);

      }


      50% {

        transform: translateY(-15px);

      }


    }



    @keyframes shine {


      0%,
      100% {

        text-shadow:

          0 0 15px rgba(255, 255, 255, .2);

      }



      50% {


        text-shadow:

          0 0 40px white,

          0 0 90px rgba(255, 255, 255, .5);


      }


    }



    /* subtitle */


    #splash {

      color: #aaa;

      font-size: 16px;

      margin-top: 10px;

      text-align: center;

    }



    /* Search */


    .search-container {


      width: 100%;


      display: flex;


      justify-content: center;


      margin-top: 40px;


    }



    #fv {


      width: min(700px, 95%);


      display: flex;


      gap: 12px;


      padding: 12px;



      background:

        rgba(255, 255, 255, .06);



      border:

        1px solid rgba(255, 255, 255, .15);



      border-radius: 50px;



      backdrop-filter: blur(25px);



      box-shadow:

        0 20px 60px rgba(0, 0, 0, .8);



    }



    /* input */


    #input {


      flex: 1;


      height: 58px;


      padding: 0 25px;



      background: #111;



      color: white;



      font-size: 16px;



      border-radius: 50px;



      border: 1px solid #333;



      outline: none;



      transition: .35s;


    }



    #input::placeholder {

      color: #777;

    }



    #input:hover {

      border-color: #777;

    }



    #input:focus {


      background: #181818;


      border-color: white;



      box-shadow:

        0 0 25px rgba(255, 255, 255, .2);



      transform: translateY(-3px);


    }




    /* Button */


    .search-btn {


      height: 58px;


      padding: 0 35px;



      border: none;


      border-radius: 50px;



      background: white;



      color: black;



      font-size: 16px;


      font-weight: 800;



      cursor: pointer;



      display: flex;


      align-items: center;


      gap: 8px;



      transition: .3s;


    }



    .search-btn:hover {


      transform:

        translateY(-5px) scale(1.05);



      box-shadow:

        0 15px 40px rgba(255, 255, 255, .35);



    }



    .search-btn:active {

      transform: scale(.95);

    }





    /* phones */


    @media(max-width:600px) {


      .title {

        font-size: 50px;

        letter-spacing: -3px;

      }



      #fv {

        flex-direction: column;

        width: 95%;

        border-radius: 30px;


      }



      #input {


        width: 100%;


      }



      .search-btn {


        width: 100%;


        justify-content: center;


      }



    }
  </style>


</head>



<body class="center" onload="SplashT()">



  <div class="f-nav"></div>



  <div id="particles-js">


    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>



    <div class="main">


      <h1 class="title">

        SoulyProxy

      </h1>



      <p id="splash"></p>



      <div class="search-container">


        <form id="fv" method="POST">


          <input id="input" class="truncate" placeholder="Search or enter a URL" type="text" />



          <button class="search-btn" type="submit">


            <i class="fas fa-arrow-right"></i>

            Launch


          </button>


        </form>



      </div>



    </div>



  </div>
