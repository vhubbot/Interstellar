  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');


    * {
      box-sizing: border-box;
    }


    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Inter, Arial, sans-serif;
      overflow: hidden;
    }


    /* Animated background */

    body:before {

      content: "";
      position: fixed;
      inset: -50%;

      background:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, .12), transparent 25%),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, .08), transparent 25%);

      animation: bgMove 12s infinite alternate;

    }


    @keyframes bgMove {

      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.3);
      }

    }


    /* particles */

    #particles-js {

      position: fixed;
      inset: 0;
      z-index: 1;

    }


    /* Main */

    .main {

      position: relative;
      z-index: 2;

      height: 100vh;

      display: flex;
      flex-direction: column;

      justify-content: center;
      align-items: center;

    }



    /* Logo */


    .title {

      font-size: 90px;

      font-weight: 800;

      letter-spacing: -5px;

      margin: 0;


      animation:
        float 4s infinite ease-in-out,
        glow 3s infinite;


    }


    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-18px);
      }

    }


    @keyframes glow {

      0%,
      100% {

        text-shadow:
          0 0 15px rgba(255, 255, 255, .2);

      }


      50% {

        text-shadow:
          0 0 40px white,
          0 0 80px rgba(255, 255, 255, .4);

      }

    }



    /* Subtitle */


    #splash {

      color: #aaa;

      font-size: 18px;

      margin-top: -15px;

    }



    /* Search */


    .search-container {

      margin-top: 50px;

    }


    #fv {

      display: flex;

      gap: 15px;

      padding: 15px;

      background: rgba(255, 255, 255, .05);

      border: 1px solid rgba(255, 255, 255, .12);

      border-radius: 40px;

      backdrop-filter: blur(20px);


      box-shadow:
        0 20px 70px rgba(0, 0, 0, .8);

    }



    /* Input */


    #input {

      width: 450px;

      padding: 18px 25px;

      font-size: 16px;


      background: #111;

      color: white;


      border-radius: 50px;

      border: 1px solid #333;

      outline: none;


      transition: .3s;

    }



    #input::placeholder {

      color: #777;

    }



    #input:hover {

      border-color: white;

    }


    #input:focus {

      background: #171717;

      border-color: white;

      transform: translateY(-3px);

    }



    /* Button */


    .search-btn {

      padding: 18px 35px;

      border: none;

      border-radius: 50px;


      background: white;

      color: black;


      font-size: 16px;

      font-weight: 800;


      cursor: pointer;


      transition: .3s;


    }


    .search-btn:hover {

      transform:
        translateY(-5px) scale(1.05);


      box-shadow:
        0 15px 40px rgba(255, 255, 255, .3);

    }


    .search-btn:active {

      transform: scale(.95);

    }



    /* Mobile */

    @media(max-width:700px) {


      .title {

        font-size: 55px;

      }


      #fv {

        flex-direction: column;

        width: 90vw;

      }


      #input {

        width: 100%;

      }


      .search-btn {

        width: 100%;

      }


    }
  </style>


</head>

          <button type="submit" class="search-btn">

            <i class="fas fa-arrow-right"></i>

            Launch

          </button>


        </form>


      </div>


    </div>


  </div>
